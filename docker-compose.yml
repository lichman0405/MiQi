x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.miqi:/home/miqi/.miqi

services:
  miqi-gateway:
    container_name: miqi-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:18790:18790"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  miqi-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
